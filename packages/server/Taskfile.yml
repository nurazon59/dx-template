version: "3"

tasks:
  dev:
    desc: tsx watch で起動
    cmds:
      - pnpm dev

  build:
    desc: TypeScript ビルド
    cmds:
      - pnpm build

  start:
    desc: ビルド済みアプリ起動
    cmds:
      - pnpm start

  typecheck:
    desc: 型チェック
    cmds:
      - pnpm typecheck

  test:
    desc: vitest でテスト実行
    cmds:
      - pnpm test

  test:watch:
    desc: vitest ウォッチモード
    cmds:
      - pnpm test:watch

  generate:openapi:
    desc: OpenAPI JSON 生成
    cmds:
      - pnpm generate:openapi

  migrate:generate:
    desc: マイグレーションSQL生成
    cmds:
      - pnpm exec drizzle-kit generate

  migrate:up:
    desc: マイグレーション実行
    cmds:
      - pnpm exec drizzle-kit migrate

  migrate:push:
    desc: スキーマ直接反映（開発用）
    cmds:
      - pnpm exec drizzle-kit push

  migrate:studio:
    desc: Drizzle Studio 起動
    cmds:
      - pnpm exec drizzle-kit studio
