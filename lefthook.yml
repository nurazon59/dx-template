pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,ts,jsx,tsx}"
      run: pnpm lint
    format:
      glob: "*.{js,ts,jsx,tsx}"
      run: pnpm fmt

pre-push:
  parallel: true
  commands:
    test:
      run: task test
    build:
      run: task build
    typecheck:
      run: task typecheck
