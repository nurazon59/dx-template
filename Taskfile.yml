version: "3"

dotenv:
  - .env.local

includes:
  bot:
    taskfile: packages/slack-bot/Taskfile.yml
    dir: packages/slack-bot
  server:
    taskfile: packages/server/Taskfile.yml
    dir: packages/server
  web:
    taskfile: packages/web/Taskfile.yml
    dir: packages/web

tasks:
  dev:
    desc: 全パッケージ並列起動（mprocs）
    cmds:
      - mprocs

  dev:bot:
    desc: bot パッケージのみ起動
    cmds:
      - task: bot:dev

  dev:server:
    desc: server パッケージのみ起動
    cmds:
      - task: server:dev

  dev:web:
    desc: web パッケージのみ起動
    cmds:
      - task: web:dev

  dev:local:
    desc: bot ローカル開発ハーネス起動（Slack 不要）
    cmds:
      - task: bot:dev:local

  build:
    desc: 全パッケージ TypeScript ビルド
    cmds:
      - pnpm -r build

  lint:
    desc: oxlint でリント
    cmds:
      - pnpm lint

  fmt:
    desc: oxfmt でフォーマット
    cmds:
      - pnpm fmt

  typecheck:
    desc: 型チェック
    cmds:
      - pnpm -r typecheck

  test:
    desc: vitest でテスト実行
    cmds:
      - pnpm -r test

  gen:
    desc: マイグレーション + OpenAPI スキーマ + クライアント型を一括生成
    cmds:
      - task: server:migrate:generate
      - task: server:generate:openapi
      - task: web:generate:api
      - task: bot:generate:api

  migrate:
    desc: マイグレーション実行
    cmds:
      - task: server:migrate:up

  setup:
    desc: 初期セットアップ
    cmds:
      - pnpm install
      - cp -n .env.local.example .env.local
      - lefthook install


  docker:build:bot:
    desc: slack-bot Docker イメージビルド
    cmds:
      - docker build -t slack-bot-template .

  docker:build:server:
    desc: server Docker イメージビルド
    cmds:
      - docker build -t dx-template-server -f packages/server/Dockerfile .

  docker:run:bot:
    desc: slack-bot Docker コンテナ実行
    cmds:
      - docker run --rm --env-file .env.local slack-bot-template

  docker:run:server:
    desc: server Docker コンテナ実行
    cmds:
      - docker run --rm --env-file .env.local -p 3000:3000 dx-template-server

  infra:init:
    desc: Terraform 初期化
    cmds:
      - terraform -chdir=infra/terraform init

  infra:migrate-state:
    desc: Terraform state を S3 backend へ移行
    cmds:
      - terraform -chdir=infra/terraform init -migrate-state

  infra:plan:
    desc: Terraform 実行計画
    cmds:
      - terraform -chdir=infra/terraform plan -var-file=envs/staging.tfvars

  infra:apply:
    desc: Terraform 適用
    cmds:
      - terraform -chdir=infra/terraform apply -var-file=envs/staging.tfvars

  infra:destroy:
    desc: Terraform リソース削除
    cmds:
      - terraform -chdir=infra/terraform destroy -var-file=envs/staging.tfvars
