version: "3"

dotenv:
  - .env.local

includes:
  bot:
    taskfile: packages/slack-bot/Taskfile.yml
    dir: packages/slack-bot
  server:
    taskfile: packages/server/Taskfile.yml
    dir: packages/server
  web:
    taskfile: packages/web/Taskfile.yml
    dir: packages/web

tasks:
  dev:
    desc: 全パッケージ並列起動（mprocs）
    cmds:
      - mprocs "task bot:dev" "task server:dev" "task web:dev"

  dev:bot:
    desc: bot パッケージのみ起動
    cmds:
      - task: bot:dev

  dev:server:
    desc: server パッケージのみ起動
    cmds:
      - task: server:dev

  dev:web:
    desc: web パッケージのみ起動
    cmds:
      - task: web:dev

  dev:local:
    desc: bot ローカル開発ハーネス起動（Slack 不要）
    cmds:
      - task: bot:dev:local

  build:
    desc: 全パッケージ TypeScript ビルド
    cmds:
      - pnpm -r build

  lint:
    desc: oxlint でリント
    cmds:
      - pnpm lint

  fmt:
    desc: oxfmt でフォーマット
    cmds:
      - pnpm fmt

  typecheck:
    desc: 型チェック
    cmds:
      - pnpm -r typecheck

  test:
    desc: vitest でテスト実行
    cmds:
      - pnpm -r test

  setup:
    desc: 初期セットアップ
    cmds:
      - pnpm install
      - cp -n .env.local.example .env.local

  migrate:generate:
    desc: マイグレーションSQL生成
    cmds:
      - task: server:migrate:generate

  migrate:up:
    desc: マイグレーション実行
    cmds:
      - task: server:migrate:up

  migrate:push:
    desc: スキーマ直接反映（開発用）
    cmds:
      - task: server:migrate:push

  migrate:studio:
    desc: Drizzle Studio 起動
    cmds:
      - task: server:migrate:studio

  docker:build:
    desc: slack-bot Docker イメージビルド
    cmds:
      - docker build -t slack-bot-template .

  docker:build:server:
    desc: server Docker イメージビルド
    cmds:
      - docker build -t dx-template-server -f packages/server/Dockerfile .

  docker:run:
    desc: slack-bot Docker コンテナ実行
    cmds:
      - docker run --rm --env-file .env.local slack-bot-template

  docker:run:server:
    desc: server Docker コンテナ実行
    cmds:
      - docker run --rm --env-file .env.local -p 3000:3000 dx-template-server

  infra:init:
    desc: Terraform 初期化
    cmds:
      - terraform -chdir=infra/terraform init

  infra:plan:
    desc: Terraform 実行計画
    cmds:
      - terraform -chdir=infra/terraform plan

  infra:apply:
    desc: Terraform 適用
    cmds:
      - terraform -chdir=infra/terraform apply

  deploy:bot:
    desc: ecspresso で slack-bot デプロイ
    dir: infra/ecspresso
    cmds:
      - ecspresso deploy

  deploy:server:
    desc: ecspresso で server デプロイ
    dir: infra/ecspresso/server
    cmds:
      - ecspresso deploy
